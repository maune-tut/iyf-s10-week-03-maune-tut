<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="projects.html">PROJECTS</a></li>
        <li><a href="contact.html">CONTACT</a></li>
    </ul>
</nav>
    <header>
        <h1>Get in Touch</h1>
        <p>Have a question or want to work together? Fill out the form below.</p>
    </header>

    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Personal Information</legend>
                
                <p>
                    <label for="full-name">Full Name:</label>
                    <input type="text" id="full-name" name="full-name" placeholder="John Doe" required>
                </p>

                <p>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </p>

                <p>
                    <label for="phone">Phone Number (Optional):</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1-555-0123">
                </p>
            </fieldset>

            <fieldset>
                <legend>Message Details</legend>

                <p>
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject">
                        <option value="general">General Inquiry</option>
                        <option value="project">Project Proposal</option>
                        <option value="collaboration">Collaboration</option>
                    </select>
                </p>

                <p>
                    <label for="message">Your Message (Min 50 characters):</label><br>
                    <textarea id="message" name="message" rows="5" cols="40" 
                              placeholder="Describe your project or inquiry here..." 
                              minlength="50" required></textarea>
                </p>

                <p>
                    <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                    <label for="newsletter">Subscribe to my monthly newsletter</label>
                </p>
            </fieldset>

            <button type="submit">Send Message</button>
        </form>
    </main>

    <footer>
        <p><a href="index.html">Back to Home</a></p>
    </footer>

</body>
</html>
